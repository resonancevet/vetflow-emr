services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: openpims
      POSTGRES_PASSWORD: openpims
      POSTGRES_DB: openpims
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openpims"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: openpims
      MINIO_ROOT_PASSWORD: openpims123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # Optional: production web image. For local dev, use `pnpm dev` on the host.
  # Start with: docker compose -f docker/docker-compose.yml --profile production up -d
  web:
    profiles: ["production"]
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://openpims:openpims@postgres:5432/openpims"
      NEXTAUTH_SECRET: "docker-dev-secret-change-in-production"
      NEXTAUTH_URL: "http://localhost:3000"
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "openpims"
      S3_SECRET_KEY: "openpims123"
      S3_BUCKET: "openpims"
      S3_REGION: "us-east-1"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
